<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Intelligence | Background Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap');
        :root { --accent: #007aff; --bg: #f2f2f7; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .intro { font-family: 'Cedarville Cursive', cursive; font-size: 1.2rem; padding: 15px; text-align: center; background: white; border-bottom: 1px solid #ddd; }
        
        #app-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #main-view { flex: 1; display: flex; flex-direction: column; background: #fff; }

        .sidebar-header { padding: 20px; border-bottom: 1px solid #eee; }
        .hw-item { padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .hw-item.active { background: #eef6ff; border-left: 4px solid var(--accent); }
        .hw-name { font-weight: bold; display: block; }
        
        #chat-window { flex: 1; display: none; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 0.9rem; }
        .me { align-self: flex-end; background: var(--accent); color: white; }
        .them { align-self: flex-start; background: #e9e9eb; color: black; }

        .controls { padding: 15px; border-top: 1px solid #eee; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="intro">The Intelligence that Lives in Your Pocket, Not the Cloud</div>

<div id="app-container">
    <div id="sidebar">
        <div class="sidebar-header">
            <p style="font-size: 0.7rem; color: #666; margin: 0;">MY LICENSE:</p>
            <div id="my-id-display" style="font-family: monospace; font-weight: bold; color: var(--accent); margin-bottom: 15px;">...</div>
            <input type="text" id="target-id" placeholder="Enter Destination Code">
            <button onclick="connectToHardware()">Open Tunnel</button>
        </div>
        <div id="vault-list"></div>
    </div>

    <div id="main-view">
        <div id="chat-window">
            <div id="messages"></div>
            <div class="controls">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="msg-input" placeholder="Type message..." style="margin:0">
                    <button onclick="send()" style="width:80px">Send</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let peer, conn;
    let vault = JSON.parse(localStorage.getItem('hw_vault') || '{}');

    // 1. Permanent Hardware ID
    async function getHWID() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debug = gl.getExtension('WEBGL_debug_renderer_info');
        const specs = [gl.getParameter(debug.UNMASKED_RENDERER_WEBGL), screen.width, screen.height].join('|');
        let hash = 0;
        for (let i = 0; i < specs.length; i++) hash = ((hash << 5) - hash) + specs.charCodeAt(i);
        return "HW-" + Math.abs(hash).toString(16).toUpperCase().padStart(6, '0');
    }

    // 2. Notification Permission
    function requestNotify() {
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }
    }

    async function init() {
        requestNotify();
        const myId = await getHWID();
        document.getElementById('my-id-display').innerText = myId;
        renderVault();

        // Initialize Peer
        peer = new Peer(myId, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });

        peer.on('connection', c => {
            triggerBackgroundNotification(c.peer);
            handleConn(c);
        });
    }

    function triggerBackgroundNotification(peerId) {
        if (Notification.permission === "granted") {
            const name = vault[peerId] ? vault[peerId].name : peerId;
            new Notification("Pocket Intelligence", {
                body: `Hardware ${name} is requesting a tunnel connection!`,
                icon: "https://cdn-icons-png.flaticon.com/512/684/684809.png" // Replace with your icon
            });
        }
    }

    function connectToHardware() {
        const id = document.getElementById('target-id').value.toUpperCase().trim();
        if(id) handleConn(peer.connect(id));
    }

    function handleConn(c) {
        conn = c;
        if (!vault[c.peer]) {
            vault[c.peer] = { name: "Remote Hardware", id: c.peer };
            localStorage.setItem('hw_vault', JSON.stringify(vault));
        }
        renderVault();
        
        conn.on('open', () => {
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('messages').innerHTML = "";
        });

        conn.on('data', data => addMsg(data, 'them'));
    }

    function renderVault() {
        const list = document.getElementById('vault-list');
        list.innerHTML = "";
        Object.values(vault).forEach(hw => {
            const div = document.createElement('div');
            div.className = "hw-item";
            div.onclick = () => handleConn(peer.connect(hw.id));
            div.innerHTML = `<span class="hw-name">${hw.name}</span><span style="font-size:0.7rem; color:#888">${hw.id}</span>`;
            list.appendChild(div);
        });
    }

    function send() {
        const val = document.getElementById('msg-input').value;
        if(val) { conn.send(val); addMsg(val, 'me'); document.getElementById('msg-input').value = ''; }
    }

    function addMsg(t, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`; d.innerText = t;
        document.getElementById('messages').appendChild(d);
    }

    init();
</script>
</body>
</html>
