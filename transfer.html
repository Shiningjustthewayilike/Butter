<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Intelligence | Private Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cedarville+Cursive&display=swap');
        
        :root { --accent: #007aff; --bg: #f2f2f7; --me: #007aff; --them: #e9e9eb; }

        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Intro Branding */
        .intro { font-family: 'Cedarville Cursive', cursive; font-size: 1.2rem; padding: 15px; text-align: center; background: white; border-bottom: 1px solid #ddd; }

        .setup-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }

        .license-tag { background: #f8f9fa; border: 2px solid #007aff; padding: 10px; font-family: monospace; font-weight: bold; font-size: 1.1rem; margin: 15px 0; border-radius: 10px; color: var(--accent); cursor: pointer; }

        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }

        button { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Chat Interface */
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: var(--me); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: var(--them); color: black; border-bottom-left-radius: 2px; }

        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="intro">The Intelligence that Lives in Your Pocket, Not the Cloud</div>

    <div id="setup-screen" class="setup-screen">
        <div class="card">
            <p style="font-size: 0.8rem; color: #666;">YOUR UNIQUE DEVICE LICENSE:</p>
            <div id="my-license" class="license-tag" title="Click to copy">Generating...</div>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <p style="font-size: 0.8rem; color: #666;">CONNECT TO OTHER LICENSE:</p>
            <input type="text" id="target-license" placeholder="Enter License Code">
            <button onclick="connectToPartner()">Initiate Chat</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Type a private message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="width: 80px;">Send</button>
        </div>
    </div>

    <script>
        let peer;
        let connection;

        // 1. Generate a UNIQUE license for this hardware
        function generateHardwareLicense() {
            const fingerprint = [
                navigator.userAgent.length,
                screen.width,
                screen.height,
                navigator.hardwareConcurrency || 4
            ].join('-');
            // Simple hash function to create a unique-ish string
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                hash = ((hash << 5) - hash) + fingerprint.charCodeAt(i);
                hash |= 0; 
            }
            return "PKT-" + Math.abs(hash).toString(16).toUpperCase();
        }

        const myUniqueId = generateHardwareLicense();
        document.getElementById('my-license').innerText = myUniqueId;

        // 2. Initialize Peer with unique hardware ID
        peer = new Peer(myUniqueId, {
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
        });

        peer.on('open', (id) => {
            console.log('Online with License:', id);
        });

        // 3. Handle Incoming Connection
        peer.on('connection', (conn) => {
            connection = conn;
            setupChat();
        });

        // 4. Initiate Connection to another License
        function connectToPartner() {
            const target = document.getElementById('target-license').value.trim().toUpperCase();
            if(!target) return alert("Enter a valid License!");
            
            connection = peer.connect(target);
            setupChat();
        }

        function setupChat() {
            connection.on('open', () => {
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                appendMessage("System", "Encrypted Tunnel Established. No data is being stored on the cloud.", "them");
            });

            connection.on('data', (data) => {
                appendMessage("Them", data, "them");
            });
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value;
            if(!msg) return;

            connection.send(msg);
            appendMessage("Me", msg, "me");
            input.value = "";
        }

        function appendMessage(sender, text, type) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // Copy license to clipboard
        document.getElementById('my-license').onclick = function() {
            navigator.clipboard.writeText(this.innerText);
            alert("License copied! Send this to your partner.");
        }
    </script>
</body>
</html>
